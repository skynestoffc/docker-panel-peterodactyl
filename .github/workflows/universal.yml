name: universal

on:
  push:
    branches: [ main, master ]
    paths:
      - 'universal/**'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: debian12
            tag: debian12_universal
            base_image: debian:12
          - name: debian13
            tag: debian13_universal
            base_image: debian:13
          - name: debian
            tag: debian_universal
            base_image: debian:13
          - name: ubuntu22
            tag: ubuntu22_universal
            base_image: ubuntu:22.04
          - name: ubuntu24
            tag: ubuntu24_universal
            base_image: ubuntu:24.04
          - name: ubuntu25
            tag: ubuntu25_universal
            base_image: ubuntu:25.10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if Dockerfile exists
        run: |
          if [ ! -f "universal/debian/Dockerfile" ]; then
            echo "Dockerfile not found: universal/debian/Dockerfile"
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./universal/debian/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          tags: |
            ghcr.io/siputzx/panel:${{ matrix.image.tag }}
          build-args: |
            BASE_IMAGE=${{ matrix.image.base_image }}
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          cache-from: |
            type=gha,scope=universal${{ matrix.image.tag }}
            type=registry,ref=ghcr.io/siputzx/panel:${{ matrix.image.tag }}-cache
          cache-to: |
            type=gha,mode=max,scope=universal${{ matrix.image.tag }}
            type=registry,ref=ghcr.io/siputzx/panel:${{ matrix.image.tag }}-cache,mode=max
          provenance: false
          sbom: false
